<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login BESS</title>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Seu email"><br><br>
  <input type="password" id="senha" placeholder="Sua senha"><br><br>

  <button onclick="login()">Entrar</button>

  <p id="status"></p>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">
  <h1>Bem-vindo ao sistema BESS ⚡</h1>
  <p>Login funcionando com segurança ✔️</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  'https://rxmfafapkmyvswdeaxgu.supabase.co',
  'sb_publishable_Q0wAaL6_2GrES9DxyFLqSQ_Yy91KZnI'
)

async function login() {
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value

  // 🔐 LOGIN VIA AUTH
  const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  })

  if (loginError) {
    document.getElementById('status').innerText = "Email ou senha inválidos"
    return
  }

  // 🔎 BUSCAR DADOS NA TABELA (AGORA FUNCIONA COM RLS)
  const { data: userData, error: userError } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('email', email)
    .single()

  if (userError || !userData) {
    document.getElementById('status').innerText = "Usuário não encontrado na base"
    return
  }

  if (!userData.ativo) {
    document.getElementById('status').innerText = "Acesso desativado"
    return
  }

  if (userData.expira_em && new Date(userData.expira_em) < new Date()) {
    document.getElementById('status').innerText = "Acesso expirado"
    return
  }

  // ✅ LIBERA SISTEMA
  document.getElementById('login').style.display = 'none'
  document.getElementById('sistema').style.display = 'block'
}
</script>

</body>
</html>
